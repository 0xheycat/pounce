# git-cliff configuration — generates CHANGELOG.md from Conventional Commits.
# Docs: https://git-cliff.org

[changelog]
header = """
# Changelog

All notable changes to **Pounce** are documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/), and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
body = """
{% if version %}\
## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {{ commit.message | upper_first | trim }} ([{{ commit.id | truncate(length=7, end="") }}])
{% endfor %}\
{% endfor %}\n
"""
footer = """
<!-- Pounce · generated by git-cliff -->
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
topo_order = false
sort_commits = "oldest"
commit_parsers = [
  { message = "^feat", group = "🚀 Features" },
  { message = "^fix", group = "🐛 Bug Fixes" },
  { message = "^perf", group = "⚡ Performance" },
  { message = "^refactor", group = "🚜 Refactor" },
  { message = "^docs", group = "📚 Documentation" },
  { message = "^test", group = "🧪 Testing" },
  { message = "^build", group = "📦 Build" },
  { message = "^ci", group = "🤖 CI" },
  { message = "^style", group = "🎨 Styling" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore", group = "🧹 Chores" },
  { message = "^revert", group = "◀️ Reverts" },
]
